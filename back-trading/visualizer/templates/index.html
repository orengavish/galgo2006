<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>back-trading</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 13px; background: #0d1117; color: #c9d1d9; }

  /* ── Header ── */
  header {
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 8px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  header h1 { font-size: 14px; color: #e6edf3; }

  .ib-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    border: 1px solid #30363d; color: #8b949e; white-space: nowrap;
  }
  .ib-pill.up   { border-color: #3fb950; color: #3fb950; }
  .ib-pill.down { border-color: #484f58; color: #484f58; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #484f58; transition: background 0.4s;
  }
  .up .dot { background: #3fb950; box-shadow: 0 0 4px #3fb95088; }

  #hdr-price {
    font-size: 16px; font-weight: bold; color: #e6edf3; letter-spacing: 0.5px;
    transition: color 0.3s;
  }
  #hdr-price.stale { color: #484f58; }

  #hdr-hb {
    width: 7px; height: 7px; border-radius: 50%; background: #484f58;
    transition: background 0.15s; flex-shrink: 0;
  }
  #hdr-hb.pulse { background: #58a6ff; }

  #hdr-pnl { margin-left: auto; font-size: 15px; font-weight: bold; }
  .pnl-pos { color: #3fb950; }
  .pnl-neg { color: #f85149; }

  /* ── Controls ── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px;
    background: #161b22; border-bottom: 1px solid #30363d; align-items: center;
  }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  label { color: #8b949e; font-size: 11px; white-space: nowrap; }

  input[type="date"], input[type="text"], input[type="number"], select {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px;
  }
  input[type="number"] { width: 58px; }
  input[type="text"]   { width: 90px; }
  input[type="date"]   { width: 130px; }

  .sep { width: 1px; background: #30363d; height: 22px; margin: 0 2px; }

  button.action {
    padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer;
    font-family: monospace; font-size: 12px; font-weight: bold;
  }
  .btn-generate { background: #238636; color: #fff; }
  .btn-send     { background: #f0883e; color: #000; }
  .btn-stop     { background: #da3633; color: #fff; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Status bar ── */
  .status-bar {
    padding: 5px 16px; background: #0d1117; border-bottom: 1px solid #30363d;
    display: flex; gap: 20px; font-size: 11px; color: #8b949e; align-items: center;
  }
  .pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .pill-idle      { background: #21262d; color: #8b949e; }
  .pill-generating{ background: #1f4068; color: #79c0ff; }
  .pill-scheduled { background: #3d2b00; color: #f0883e; }
  .pill-running   { background: #1a4f1a; color: #3fb950; }
  .pill-done      { background: #1a3b1a; color: #3fb950; }
  .pill-error     { background: #4a1212; color: #f85149; }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 113px); }
  .main-panel { overflow-y: auto; padding: 10px 12px; }
  .side-panel { border-left: 1px solid #30363d; overflow-y: auto; padding: 10px 12px; }
  .panel-title {
    font-size: 10px; color: #8b949e; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }

  /* ── Orders table ── */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    color: #8b949e; text-align: left; padding: 4px 6px;
    border-bottom: 1px solid #21262d; position: sticky; top: 0;
    background: #0d1117; font-size: 11px;
  }
  td { padding: 3px 6px; border-bottom: 1px solid #161b22; }
  tr:hover td { background: #161b22; }

  .dir-buy  { color: #3fb950; }
  .dir-sell { color: #f85149; }
  .st-scheduled  { color: #484f58; }
  .st-submitting { color: #79c0ff; }
  .st-submitted  { color: #79c0ff; }
  .st-open       { color: #e3b341; }
  .st-tp         { color: #3fb950; font-weight: bold; }
  .st-sl         { color: #f85149; font-weight: bold; }
  .st-expired    { color: #484f58; }
  .st-error      { color: #f85149; }
  .pnl-p { color: #3fb950; }
  .pnl-n { color: #f85149; }
  .tbd   { color: #484f58; font-style: italic; }

  /* ── Events ── */
  .events-list { list-style: none; font-size: 11px; }
  .events-list li {
    padding: 3px 0; border-bottom: 1px solid #161b22;
    display: flex; gap: 6px; word-break: break-word;
  }
  .ev-time  { color: #484f58; flex-shrink: 0; }
  .ev-CONN  { color: #79c0ff; }
  .ev-FILL  { color: #3fb950; font-weight: bold; }
  .ev-ORDER { color: #e3b341; }
  .ev-RESULT{ color: #3fb950; font-weight: bold; }
  .ev-ERROR { color: #f85149; }
  .ev-WARN  { color: #e3b341; }
  .ev-INFO  { color: #8b949e; }
  .ev-PRICE { color: #c9d1d9; }
  .ev-STOP  { color: #f85149; }

  .empty { color: #484f58; font-style: italic; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>back-trading</h1>

  <div class="ib-pill down" id="pill-live">
    <span class="dot"></span>IB LIVE
  </div>
  <div class="ib-pill down" id="pill-paper">
    <span class="dot"></span>IB PAPER
  </div>

  <span id="hdr-price" class="stale">MES —</span>
  <span id="hdr-hb" title="heartbeat"></span>

  <span id="hdr-date" style="color:#8b949e; font-size:12px"></span>
  <span id="hdr-pnl"></span>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Date</label>
    <input type="date" id="ctrl-date">
  </div>

  <div class="ctrl-group">
    <label>Symbol</label>
    <select id="ctrl-symbol"><option>MES</option></select>
  </div>

  <div class="sep"></div>

  <div class="ctrl-group">
    <label title="TP/SL bracket sizes in points, comma-separated">Brackets (pts)</label>
    <input type="text" id="ctrl-brackets" value="2, 16">
  </div>

  <div class="ctrl-group">
    <label title="Number of random entry timestamps per RTH session">N times</label>
    <input type="number" id="ctrl-n" value="20" min="1" max="100">
  </div>

  <div class="ctrl-group">
    <label title="Entry offset from market price (points)">Offset</label>
    <input type="number" id="ctrl-off-min" value="0.25" min="0.25" step="0.25">
    <span style="color:#484f58">–</span>
    <input type="number" id="ctrl-off-max" value="1.50" min="0.25" step="0.25">
  </div>

  <div class="sep"></div>

  <button class="action btn-generate" id="btn-generate" onclick="doGenerate()">Generate</button>
  <button class="action btn-send"     id="btn-send"     onclick="doSend()"     disabled>Send to Paper</button>
  <button class="action btn-stop"     id="btn-stop"     onclick="doStop()"     disabled>Stop</button>
</div>

<div class="status-bar">
  <span>Status: <span id="sb-status" class="pill pill-idle">idle</span></span>
  <span id="sb-counts"></span>
  <span id="sb-error" style="color:#f85149; max-width:400px; overflow:hidden; text-overflow:ellipsis"></span>
  <span id="sb-time" style="margin-left:auto; color:#484f58"></span>
</div>

<div class="layout">
  <div class="main-panel">
    <div class="panel-title">Scheduled Orders</div>
    <table>
      <thead><tr>
        <th>#</th><th>Time (CT)</th><th>Dir</th><th>Bracket</th>
        <th>Entry</th><th>TP</th><th>SL</th>
        <th>Fill@</th><th>Exit</th><th>Exit@</th><th>P&amp;L</th><th>Status</th>
      </tr></thead>
      <tbody id="orders-body">
        <tr><td colspan="12" class="empty">Click Generate to schedule orders</td></tr>
      </tbody>
    </table>
  </div>

  <div class="side-panel">
    <div class="panel-title">IB Events</div>
    <ul class="events-list" id="events-list">
      <li><span class="ev-time">—</span><span class="ev-INFO">Waiting...</span></li>
    </ul>
  </div>
</div>

<script>
let _pollInterval = null;
let _lastPrice    = null;
let _lastPriceTs  = 0;

document.getElementById("ctrl-date").value = new Date().toISOString().slice(0, 10);

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseBrackets() {
  return document.getElementById("ctrl-brackets").value
    .split(",").map(s => parseFloat(s.trim())).filter(n => !isNaN(n) && n > 0);
}

function fmtTimeCT(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString("en-US",
    { timeZone: "America/Chicago", hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function fmtP(p) {
  return p != null ? Number(p).toFixed(2) : '<span class="tbd">TBD</span>';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doGenerate() {
  const bs   = parseBrackets();
  if (!bs.length) { alert("Enter at least one bracket size"); return; }
  fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      date:             document.getElementById("ctrl-date").value,
      symbol:           document.getElementById("ctrl-symbol").value,
      bracket_sizes:    bs,
      n_timestamps:     parseInt(document.getElementById("ctrl-n").value, 10),
      entry_offset_min: parseFloat(document.getElementById("ctrl-off-min").value),
      entry_offset_max: parseFloat(document.getElementById("ctrl-off-max").value),
    })
  }).then(r => r.json()).then(d => {
    if (d.error) { alert(d.error); return; }
    startPolling();
  });
}

function doSend() {
  fetch("/api/send", { method: "POST" })
    .then(r => r.json()).then(d => { if (d.error) alert(d.error); });
}

function doStop() {
  fetch("/api/stop", { method: "POST" });
}

// ── Polling ───────────────────────────────────────────────────────────────────
function startPolling() {
  if (_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(poll, 1500);
  poll();
}

function poll() {
  fetch("/api/status").then(r => r.json()).then(update).catch(() => {});
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(s) {
  // Heartbeat
  const hb = document.getElementById("hdr-hb");
  hb.classList.add("pulse");
  setTimeout(() => hb.classList.remove("pulse"), 250);
  if (s.server_time)
    document.getElementById("sb-time").textContent = s.server_time + " UTC";

  // IB status pills
  const setpill = (id, up) => {
    const el = document.getElementById(id);
    el.className = "ib-pill " + (up ? "up" : "down");
  };
  setpill("pill-live",  s.ib_live);
  setpill("pill-paper", s.ib_paper);

  // Price
  const pel = document.getElementById("hdr-price");
  if (s.price != null) {
    _lastPrice = s.price; _lastPriceTs = Date.now();
    pel.textContent = "MES " + Number(s.price).toFixed(2);
    pel.classList.remove("stale");
  } else if (_lastPrice && Date.now() - _lastPriceTs < 15000) {
    pel.textContent = "MES " + Number(_lastPrice).toFixed(2);
    pel.classList.remove("stale");
  } else {
    pel.textContent = "MES —";
    pel.classList.add("stale");
  }

  // Header date + P&L
  document.getElementById("hdr-date").textContent = s.date || "";
  const pnlEl = document.getElementById("hdr-pnl");
  if (s.pnl != null) {
    pnlEl.className   = s.pnl >= 0 ? "pnl-pos" : "pnl-neg";
    pnlEl.textContent = (s.pnl >= 0 ? "+" : "") + "$" + Number(s.pnl).toFixed(2);
  } else {
    pnlEl.textContent = "";
  }

  // Status bar
  const stel = document.getElementById("sb-status");
  stel.className   = "pill pill-" + s.status;
  stel.textContent = s.status;

  const orders = s.orders || [], fills = s.fills || [];
  const tp   = fills.filter(f => f && f.exit_type === "TP").length;
  const sl   = fills.filter(f => f && f.exit_type === "SL").length;
  const exp  = fills.filter(f => f && f.exit_type === "EXPIRED").length;
  const open = orders.filter(o => ["OPEN","SUBMITTED","SUBMITTING"].includes(o.status)).length;
  document.getElementById("sb-counts").textContent = orders.length
    ? `${orders.length} orders | TP:${tp} SL:${sl} EXP:${exp} OPEN:${open}` : "";
  document.getElementById("sb-error").textContent = s.error || "";

  // Orders table
  const tbody = document.getElementById("orders-body");
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="12" class="empty">Click Generate to schedule orders</td></tr>';
  } else {
    let rows = "";
    orders.forEach((o, i) => {
      const f        = fills[i] || {};
      const dir      = o.direction || "";
      const st       = (f.exit_type || o.status || "").toUpperCase();
      const stCls    = "st-" + st.toLowerCase();
      const dirCls   = dir === "BUY" ? "dir-buy" : "dir-sell";
      const pnl      = f.pnl != null
        ? `<span class="${f.pnl >= 0 ? 'pnl-p' : 'pnl-n'}">${f.pnl >= 0 ? "+" : ""}$${Number(f.pnl).toFixed(2)}</span>`
        : (st === "EXPIRED" ? '<span class="tbd">—</span>' : "");
      const fillAt   = f.entry_fill_price != null
        ? Number(f.entry_fill_price).toFixed(2)
        : (o.entry_price != null ? '<span class="tbd">—</span>' : '<span class="tbd">TBD</span>');
      const exitAt   = f.exit_fill_price != null ? Number(f.exit_fill_price).toFixed(2) : "";
      rows += `<tr>
        <td>${i+1}</td>
        <td>${fmtTimeCT(o.ts_placed)}</td>
        <td class="${dirCls}">${dir[0]||""}</td>
        <td>${o.bracket_size != null ? o.bracket_size+"pt" : ""}</td>
        <td>${fmtP(o.entry_price)}</td>
        <td>${fmtP(o.tp_price)}</td>
        <td>${fmtP(o.sl_price)}</td>
        <td>${fillAt}</td>
        <td class="${stCls}">${st||""}</td>
        <td>${exitAt}</td>
        <td>${pnl}</td>
        <td class="${stCls}">${o.status||""}</td>
      </tr>`;
    });
    tbody.innerHTML = rows;
  }

  // Events
  const evs = (s.ib_events || []).slice().reverse();
  if (evs.length)
    document.getElementById("events-list").innerHTML = evs.map(e =>
      `<li><span class="ev-time">${e.time}</span><span class="ev-${e.type}">[${e.type}] ${e.msg}</span></li>`
    ).join("");

  // Buttons
  const active = ["generating","running"].includes(s.status);
  document.getElementById("btn-generate").disabled = active;
  document.getElementById("btn-send").disabled =
    active || !["scheduled","done"].includes(s.status) || !orders.length;
  document.getElementById("btn-stop").disabled = s.status !== "running";

  if (["done","error","idle"].includes(s.status) && _pollInterval) {
    clearInterval(_pollInterval);
    _pollInterval = null;
  }
}

startPolling();
</script>
</body>
</html>
