# Galao Back-Trading Configuration
# All tunables live here. Never hardcode values in Python files.

ib:
  gateway_log_dir: ""   # optional: IB Gateway log dir, e.g. C:\Jts\username
  live_host: 127.0.0.1
  live_port: 4001
  live_client_ids: [101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120]
  paper_host: 127.0.0.1
  paper_port: 4002
  paper_client_ids: [201, 202, 203, 204, 205, 206, 207, 208, 209, 210]
  reconnect_interval_seconds: 30
  connection_timeout: 5
  fetcher_client_ids: [801, 802, 803]

symbols:
  - MES

session:
  open_offset_minutes: 30
  shutdown_offset_minutes: 60
  timezone: America/Chicago

orders:
  active_brackets: [2, 4]
  quantity: 1
  tick_size: 0.25

position:
  stagnation_seconds: 300
  stagnation_min_move_points: 0.5
  sl_cooldown_seconds: 30

shutdown:
  exit_patience_seconds: 30
  panic_threshold_minutes: 10

decider:
  replenishment_poll_seconds: 10

broker:
  command_poll_seconds: 5
  ib_poll_seconds: 30

visualizer:
  host: 127.0.0.1
  port: 5001                    # different port from trader (5000)

backtest:
  symbol: MES
  bar_size: "1 min"             # IB bar size string
  what_to_show: TRADES
  use_rth: false                # include extended hours

generator:
  n_timestamps: 20              # random order placements per RTH session
  entry_offset_min: 0.25        # min distance from market price (points)
  entry_offset_max: 1.50        # max distance from market price (points)
  bracket_sizes: [2, 16]        # bracket TP/SL distances to test (points)
  rth_start: "08:30"            # earliest order placement (CT)
  rth_end:   "14:30"            # latest order placement (CT, leaves time to fill)

grader:
  fill_match_ticks: 1           # sim vs paper: fills within N ticks = match
  target_grade_pct: 80          # target accuracy %

paths:
  db: data/backtest.db
  test_db: data/test_backtest.db
  live_db: ../trader/data/galao.db   # live paper trading DB (read-only for calibration)
  history: ../trader/data/history    # shared tick CSVs
  results: data/results
  logs: logs
  versions: ../versions              # shared with trader
